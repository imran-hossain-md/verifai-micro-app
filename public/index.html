<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifAI Micro-Audit</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 22px; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background: #0070f3; color: white; padding: 12px; border: none; border-radius: 6px; margin-top: 20px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0051cb; }
        .result-box { margin-top: 20px; padding: 15px; background: #f8f9fa; border-left: 4px solid #0070f3; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>VerifAI Micro-Audit Tool</h2>
    
    <label>AI System Name</label>
    <input type="text" id="systemName" placeholder="e.g., Nexus LLM">

    <label>Model Classification</label>
    <select id="modelType">
        <option value="general">General Purpose AI (Chatbot)</option>
        <option value="llm">Generative AI / Foundation Model</option>
        <option value="recruitment">HR / Automated Recruitment</option>
        <option value="biometric">Biometric Identification</option>
    </select>

    <button onclick="runAudit()">Run Compliance Audit</button>

    <div class="result-box" id="resultBox">
        <strong style="color: #0070f3;">Audit Output:</strong>
        <p id="resultText" style="margin: 5px 0 0 0; font-size: 14px; line-height: 1.4;"></p>
    </div>
</div>

<script>
    async function runAudit() {
        const systemName = document.getElementById('systemName').value;
        const modelType = document.getElementById('modelType').value;
        
        if(!systemName) return alert("Please enter a system name");

        // ব্যাকএন্ড এপিআই-তে ডেটা পাঠানো
        const response = await fetch('/api/audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ systemName, modelType })
        });

        const data = await response.json();
        
        // ফলাফল স্ক্রিনে দেখানো
        const resultBox = document.getElementById('resultBox');
        const resultText = document.getElementById('resultText');
        
        resultText.innerHTML = `
            <strong>System:</strong> ${data.systemName} <br>
            <strong>Risk Score:</strong> ${data.riskScore}/100 <br>
            <strong>Verdict:</strong> ${data.summary}
        `;
        resultBox.style.display = 'block';
    }
</script>
</body>
</html>
